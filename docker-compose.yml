services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ai-mall
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: ai_mall
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: redis-ai-mall
    ports:
      - "6380:6379"
      - "8002:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai-mall-app
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ai_mall
      - DB_USERNAME=root
      - DB_PASSWORD=1234
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_API_KEY=${AI_API_KEY:-sk-placeholder}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com/v1}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-client:
    build: ./web-client
    container_name: ai-mall-client
    ports:
      - "3001:80"
    depends_on:
      - app

  web-admin:
    build: ./web-admin
    container_name: ai-mall-admin
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  mysql-data:
  uploads-data:
