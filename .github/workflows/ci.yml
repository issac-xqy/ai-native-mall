name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: ai_mall
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JWT_SECRET: ci-test-secret-do-not-use-in-production
        run: ./mvnw test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -B
        env:
          JWT_SECRET: ci-test-secret-do-not-use-in-production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall:${{ github.sha }}

      - name: Build and push web-client image
        uses: docker/build-push-action@v5
        with:
          context: ./web-client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall-client:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall-client:${{ github.sha }}

      - name: Build and push web-admin image
        uses: docker/build-push-action@v5
        with:
          context: ./web-admin
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-native-mall-admin:${{ github.sha }}
