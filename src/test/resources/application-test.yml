# ==================== Mapper Test Configuration (H2) ====================
spring:
  # 覆盖真实 MySQL 数据源为 H2 内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # 测试环境不初始化生产 schema
  sql:
    init:
      mode: never

  # 禁用所有外部中间件
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.ai.AiAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

# MyBatis Plus 配置（复用主配置的逻辑删除等设置）
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志：测试时打印 SQL
logging:
  level:
    org.example.java_ai.mapper: DEBUG
