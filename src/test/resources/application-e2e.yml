# ==================== E2E 测试配置 (H2 + 种子数据) ====================
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:e2edb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-e2e.sql

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.ai.AiAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: WARN
    org.example.java_ai: INFO
