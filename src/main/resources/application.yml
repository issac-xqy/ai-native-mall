# ==================== Application Base Configuration ====================
app:
  admin:
    user-ids: 1,2

server:
  port: 8081
  shutdown: graceful
  servlet:
    encoding:
      force: true
      charset: UTF-8
      enabled: true

spring:
  application:
    name: ai-native-mall

  # Force traditional MVC mode (avoid conflict with WebFlux/Gateway)
  main:
    web-application-type: SERVLET

  lifecycle:
    timeout-per-shutdown-phase: 30s
  
  # UTF-8 encoding configuration
  # Disable Spring AI autoconfiguration (project uses LangChain4j primarily)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.ai.AiAutoConfiguration
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  
  
  # ==================== JDK 21 Virtual Threads ====================
  threads:
    virtual:
      enabled: true
  
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8080
      eager: true
  
  # ==================== MySQL 8.0+ Database Configuration ====================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_mall}?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  # Schema initialization — only on first run (embedded DB), not on every restart
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      continue-on-error: true
  
  # ==================== Redis 7.0+ Vector Database Configuration ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 20
          min-idle: 5
          max-wait: 3000ms
  
  
  # ==================== AI Model Configuration (Tongyi Qianwen / DeepSeek) ====================
  app:
    ai:
      api-key: ${AI_API_KEY:sk-placeholder}
      base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model: ${AI_MODEL:qwen-max}
      temperature: ${AI_TEMPERATURE:0.7}
      max-tokens: ${AI_MAX_TOKENS:2000}
      top-p: ${AI_TOP_P:0.8}
      
      # Embedding 模型配置
      # 可选: text-embedding-v4 / text-embedding-v3 / text-embedding-v2
      embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
      # v4/v3: 1536维, v2: 768维
      embedding-dimension: ${AI_EMBEDDING_DIMENSION:1536}
      # 是否使用外部 Embedding 模型（默认true）
      use-external-embedding: ${USE_EXTERNAL_EMBEDDING:true}
      # 向量维度不匹配时是否自动清理（默认true）
      auto-clear-vector-store: ${AUTO_CLEAR_VECTOR_STORE:true}
      
      deepseek-api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
      deepseek-model: ${DEEPSEEK_MODEL:deepseek-chat}
  
  # ==================== File Upload Configuration ====================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  
  # File upload path and access URL
  file:
    upload:
      path: ./uploads
    access:
      url: http://localhost:8081/uploads

# ==================== MyBatis Plus Configuration ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.example.java_ai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Redisson Configuration ====================
redisson:
  config: |
    singleServerConfig:
      address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
      database: ${REDIS_DATABASE:0}
      connectionPoolSize: 64
      connectionMinimumIdleSize: 10
      retryAttempts: 3
      retryInterval: 1500
      connectTimeout: 10000
      timeout: 3000

# ==================== SpringDoc OpenAPI Configuration ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ==================== LangChain4j Configuration ====================
langchain4j:
  open-ai-chat-model:
    api-key: ${spring.app.ai.api-key}
    base-url: ${spring.app.ai.base-url}
    model-name: ${spring.app.ai.model}
    temperature: ${spring.app.ai.temperature}
    max-tokens: ${spring.app.ai.max-tokens}
    timeout: PT120S
    log-requests: true
    log-responses: true

# ==================== Actuator Health Probes ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
