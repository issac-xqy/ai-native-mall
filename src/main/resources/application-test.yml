# Test profile — 测试环境
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:ai_mall_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6380}

  sql:
    init:
      mode: never

  flyway:
    enabled: false

  cloud:
    sentinel:
      enabled: false

app:
  admin:
    user-ids: 1,2

logging:
  level:
    root: WARN
    org.example.java_ai: INFO
